    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #d97706;
        --primary-light: #fbbf24;
        --primary-dark: #b45309;
        --secondary: #6b7280;
        --accent: #10b981;
        --bg-light: #fffbf0;
        --bg-white: #ffffff;
        --text-dark: #1f2937;
        --text-light: #6b7280;
        --border-color: #fde68a;
        --radius: 1rem;
      }

      html {
        font-family: 'Poppins', sans-serif;
        scroll-behavior: smooth;
      }

      body {
        background: linear-gradient(to bottom, #fffbf0, #ffffff, #fef3c7);
        color: var(--text-dark);
        line-height: 1.6;
      }

      button {
        font-family: 'Poppins', sans-serif;
        cursor: pointer;
        border: none;
        background: none;
      }

      a {
        color: var(--primary);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      #app {
        min-height: 100vh;
      }
    </style>
  </head>
